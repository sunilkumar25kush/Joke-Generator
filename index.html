<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Joke Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Main Container -->
    <div class="container">
        <!-- Page Title -->
        <h1>🎭 AI Joke Generator</h1>
        <p class="subtitle">Click the button to get a funny joke!</p>
        
        <!-- Joke Button - Click karke joke fetch hogi -->
        <button id="jokeBtn">Tell Me a Joke! 😄</button>
        
        <!-- Joke Display Area - Yahan joke dikhegi -->
        <div id="jokeDisplay" class="joke-display">
            <p>Your joke will appear here...</p>
        </div>
    </div>
    
    <!-- JavaScript File Link -->
    <script src="script.js"></script>
</body>
</html>
